<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>RAGChef</title>
  <style>
    body {
      width: 360px;
      padding: 16px;
      font-family: Arial, sans-serif;
    }

    h3 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      height: 100px;
      box-sizing: border-box;
      padding: 8px;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    #answer {
      margin-top: 14px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h3>RAGChef</h3>

  <textarea id="question" placeholder="Ask a recipe question..."></textarea>

  <button id="askBtn">Ask</button>

  <div id="answer"></div>

  <script src="popup.js"></script>
</body>
</html>
